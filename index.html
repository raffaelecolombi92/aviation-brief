<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviation Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#0B0E14; --bg1:#111624; --bg2:#171E2E; --bg3:#1E2740;
    --line:#242E44; --line-soft:#1B2338;
    --txt:#E7ECF4; --txt-2:#AAB6C9; --muted:#69768E;
    --accent:#4CC9E8; --accent-soft:rgba(76,201,232,.12);
    --err:#E0684F;
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --disp:'Space Grotesk', sans-serif;
    --body:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{animation:none!important;transition:none!important} }
  body{background:var(--bg0);color:var(--txt);font-family:var(--body);font-size:14px;line-height:1.55;
       background-image:radial-gradient(ellipse 900px 420px at 50% -160px, rgba(76,201,232,.07), transparent)}

  /* ---------- Header ---------- */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(11,14,20,.94);backdrop-filter:blur(8px);
          border-bottom:1px solid var(--line-soft)}
  .topbar-in{max-width:1180px;margin:0 auto;padding:14px 22px 0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{font-family:var(--disp);font-weight:700;font-size:18px;white-space:nowrap;color:var(--txt);text-decoration:none}
  .brand .dot{color:var(--accent)}
  .spacer{flex:1}
  .stamp{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.03em}

  nav.idx{max-width:1180px;margin:0 auto;padding:8px 22px 0;display:flex;flex-wrap:wrap;column-gap:26px}
  nav.idx a{font-family:var(--body);font-weight:500;font-size:12.5px;color:var(--txt-2);text-decoration:none;
            padding:6px 0 10px;border-bottom:2px solid transparent;letter-spacing:.01em}
  nav.idx a:hover,nav.idx a:focus-visible{color:var(--txt);border-bottom-color:var(--accent);outline:none}
  nav.idx a.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* ---------- Shared ---------- */
  main{max-width:1180px;margin:0 auto;padding:26px 22px 80px}
  .card-meta{display:flex;gap:10px;align-items:baseline;font-family:var(--mono);font-size:10px;letter-spacing:.05em;margin-bottom:7px}
  .card-src{color:var(--accent);font-weight:600;text-transform:uppercase}
  .card-when{color:var(--muted);margin-left:auto}
  .card{background:var(--bg2);border:1px solid var(--line-soft);border-radius:9px;overflow:hidden;
        display:flex;flex-direction:column;transition:border-color .15s, background .15s, transform .15s}
  .card:hover{border-color:var(--accent);background:var(--bg3);transform:translateY(-2px)}
  .card-img{aspect-ratio:16/9;width:100%;object-fit:cover;display:block;background:var(--bg3)}
  .card-body{padding:12px 15px 14px;display:flex;flex-direction:column;flex:1}
  .card-hl{font-weight:600;font-size:13.5px;line-height:1.4;color:var(--txt)}
  .card-hl a{color:inherit;text-decoration:none}
  .card-hl a:hover{color:var(--accent)}
  .card-hl a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .card-sum{margin-top:6px;font-size:12px;color:var(--txt-2);line-height:1.5}

  /* ---------- Home page ---------- */
  section.sec{background:var(--bg1);border:1px solid var(--line-soft);border-radius:12px;margin-bottom:22px;overflow:hidden}
  .sec-head{display:flex;align-items:baseline;gap:14px;padding:16px 20px 14px;flex-wrap:wrap}
  .sec-title{font-family:var(--disp);font-weight:600;font-size:18px}
  .sec-title a{color:var(--txt);text-decoration:none}
  .sec-title a:hover{color:var(--accent)}
  .sec-desc{font-size:12px;color:var(--muted)}
  .sec-meta{margin-left:auto}
  .viewall{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--accent);text-decoration:none;
           border:1px solid rgba(76,201,232,.35);padding:5px 12px;border-radius:6px;background:var(--accent-soft)}
  .viewall:hover{border-color:var(--accent)}
  .viewall:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 20px;border-top:1px solid var(--line-soft)}

  /* ---------- Section sub-page ---------- */
  .crumb{font-family:var(--mono);font-size:11px;letter-spacing:.04em;margin-bottom:16px}
  .crumb a{color:var(--muted);text-decoration:none}
  .crumb a:hover{color:var(--accent)}
  .page-head{margin-bottom:8px}
  .page-title{font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.15}
  .page-sub{margin-top:6px;font-size:13px;color:var(--muted)}
  .page-count{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.04em}

  .lead-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0 8px}

  .day-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--muted);
             padding:18px 0 6px;display:flex;align-items:center;gap:10px}
  .day-label::after{content:'';flex:1;height:1px;background:var(--line-soft)}
  .day-label.today{color:var(--accent)}
  .row{display:grid;grid-template-columns:86px 140px 1fr;gap:14px;padding:12px 0;border-bottom:1px solid var(--line-soft);align-items:start}
  .row:last-child{border-bottom:none}
  .row-thumb{width:86px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--line-soft);display:block;background:var(--bg3)}
  .row-meta{font-family:var(--mono);font-size:10px;letter-spacing:.05em;padding-top:2px}
  .row-src{color:var(--accent);font-weight:600;text-transform:uppercase;display:block}
  .row-when{color:var(--muted)}
  .row-hl{font-weight:600;font-size:13.5px;line-height:1.4}
  .row-hl a{color:var(--txt);text-decoration:none}
  .row-hl a:hover{color:var(--accent)}
  .row-sum{margin-top:4px;font-size:12px;color:var(--txt-2)}

  .state{background:var(--bg1);border:1px dashed var(--line);border-radius:12px;
         padding:34px;text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:22px}
  .state.err{color:var(--err);border-color:var(--err)}

  footer{max-width:1180px;margin:0 auto;padding:0 22px 50px;font-family:var(--mono);font-size:10.5px;
         color:var(--muted);line-height:1.8}

  @media (max-width:820px){
    .cards-row,.lead-row{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
    .cards-row .card,.lead-row .card{min-width:260px;scroll-snap-align:start}
    .sec-desc{display:none}
    .page-title{font-size:24px}
    .row{grid-template-columns:66px 1fr}
    .row-thumb{width:66px;height:48px}
    .row-meta{grid-column:2}
    .row > div:last-child{grid-column:1/-1}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <a class="brand" href="#/">AVIATION<span class="dot">/</span>DAILY BRIEF</a>
    <div class="spacer"></div>
    <span class="stamp" id="stamp">LOADING…</span>
  </div>
  <nav class="idx" aria-label="Sections" id="idxIn"></nav>
</div>

<main id="main"></main>

<footer>
  Home shows the three most recent items per section — open a section for its standalone page with the full day-by-day archive.
  Headlines and images link to and come from the original publishers; summaries are publisher excerpts.
  Updated automatically every few hours.
</footer>

<script>
const SECTIONS = [
  { id:'network',  title:'Airlines & Network',          desc:'Routes, capacity, alliances, airline strategy' },
  { id:'airports', title:'Airports & Infrastructure',   desc:'Development, concessions, traffic, slots' },
  { id:'fleet',    title:'Fleet, Orders & OEMs',        desc:'Orders, deliveries, programmes, engines, supply chain' },
  { id:'finance',  title:'Finance, Leasing & M&A',      desc:'Lessors, trading, financings, earnings, M&A' },
  { id:'bizav',    title:'Private & Business Aviation', desc:'Bizjet OEMs, charter, fractional, FBOs' },
  { id:'policy',   title:'Policy & Regulation',         desc:'Regulators, traffic rights, SAF mandates, safety' },
];
const FRONT_PAGE_ITEMS = 3;
let DATA = null;

const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const todayKey = new Date().toISOString().slice(0,10);
function fmtDay(k){ if(!k) return ''; const [y,m,d]=k.split('-').map(Number); return `${String(d).padStart(2,'0')} ${MONTHS[m-1]} ${y}`; }
function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function safeUrl(u){ return (u && /^https?:\/\//i.test(u)) ? u : null; }
function itemsOf(id){ return (DATA && DATA.sections && DATA.sections[id]) || []; }

const PH = 'data:image/svg+xml;utf8,'+encodeURIComponent(
  `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'>
    <defs><linearGradient id='g' x1='0' y1='1' x2='1' y2='0'>
      <stop offset='0' stop-color='#1B3A5C'/><stop offset='1' stop-color='#4CC9E8'/></linearGradient></defs>
    <rect width='320' height='180' fill='url(#g)'/>
    <path d='M40 130 L150 96 L286 62' stroke='rgba(255,255,255,.35)' stroke-width='2' stroke-dasharray='2 6' fill='none'/>
    <path d='M150 96 l-16 -5 l4 9 l-9 4 l12 3 z' fill='rgba(255,255,255,.85)'/>
  </svg>`);
function imgTag(it, cls){
  const src = safeUrl(it.img) || PH;
  return `<img class="${cls}" src="${esc(src)}" alt="" loading="lazy" referrerpolicy="no-referrer"
          onerror="this.onerror=null;this.src='${PH}'">`;
}

function cardHTML(it){
  const url = safeUrl(it.url);
  const hl = url ? `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(it.headline)}</a>` : esc(it.headline);
  return `<article class="card">
    ${imgTag(it,'card-img')}
    <div class="card-body">
      <div class="card-meta"><span class="card-src">${esc(it.source||'—')}</span><span class="card-when">${esc(fmtDay(it.day))}</span></div>
      <h3 class="card-hl">${hl}</h3>
      <p class="card-sum">${esc(it.summary||'')}</p>
    </div>
  </article>`;
}
function rowHTML(it){
  const url = safeUrl(it.url);
  const hl = url ? `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(it.headline)}</a>` : esc(it.headline);
  return `<article class="row">
    ${imgTag(it,'row-thumb')}
    <div class="row-meta"><span class="row-src">${esc(it.source||'—')}</span><span class="row-when">${esc(fmtDay(it.day))}</span></div>
    <div><h3 class="row-hl">${hl}</h3><p class="row-sum">${esc(it.summary||'')}</p></div>
  </article>`;
}
function dayGroups(items){
  const byDay={}; for(const it of items){ (byDay[it.day||'unknown'] ||= []).push(it); }
  return Object.keys(byDay).sort().reverse().map(d=>({day:d, items:byDay[d]}));
}

/* ---------- Views ---------- */
function renderHome(){
  const main = document.getElementById('main');
  let anyItems = false;
  let html = '';
  for(const s of SECTIONS){
    const items = itemsOf(s.id);
    if(items.length) anyItems = true;
    const front = items.length
      ? items.slice(0,FRONT_PAGE_ITEMS).map(cardHTML).join('')
      : `<div style="grid-column:1/-1" class="day-label">NO ITEMS YET — WILL FILL AFTER THE NEXT UPDATE</div>`;
    html += `
      <section class="sec">
        <div class="sec-head">
          <h2 class="sec-title"><a href="#/${s.id}">${s.title}</a></h2>
          <span class="sec-desc">${s.desc}</span>
          <span class="sec-meta"><a class="viewall" href="#/${s.id}">View all ${items.length} →</a></span>
        </div>
        <div class="cards-row">${front}</div>
      </section>`;
  }
  if(!anyItems){
    html = `<div class="state">No news yet — the update job hasn't run. In GitHub: Actions → "Update news" → Run workflow, then reload this page.</div>` + html;
  }
  main.innerHTML = html;
}

function renderSection(id){
  const s = SECTIONS.find(x=>x.id===id);
  if(!s){ location.hash = '#/'; return; }
  const main = document.getElementById('main');
  const items = itemsOf(id);
  const lead = items.slice(0,3);
  const rest = items;
  const hist = items.length
    ? dayGroups(rest).map(g=>
        `<div class="day-label ${g.day===todayKey?'today':''}">${g.day===todayKey?'TODAY · ':''}${fmtDay(g.day)||'EARLIER'}</div>`
        + g.items.map(rowHTML).join('')).join('')
    : `<div class="state">No items in this section yet — check back after the next update.</div>`;

  main.innerHTML = `
    <div class="crumb"><a href="#/">← ALL SECTIONS</a></div>
    <div class="page-head">
      <h1 class="page-title">${s.title}</h1>
      <p class="page-sub">${s.desc}</p>
      <p class="page-count">${items.length} STORIES ARCHIVED</p>
    </div>
    ${lead.length ? `<div class="lead-row">${lead.map(cardHTML).join('')}</div>` : ''}
    ${hist}`;
  window.scrollTo(0,0);
}

function route(){
  const hash = location.hash.replace(/^#\/?/, '');
  document.querySelectorAll('nav.idx a').forEach(a=>{
    a.classList.toggle('active', a.dataset.sec === hash);
  });
  document.title = hash && SECTIONS.some(s=>s.id===hash)
    ? `${SECTIONS.find(s=>s.id===hash).title} — Aviation Daily Brief`
    : 'Aviation Daily Brief';
  if(hash && SECTIONS.some(s=>s.id===hash)) renderSection(hash);
  else renderHome();
}

/* ---------- Boot ---------- */
async function boot(){
  const idxIn = document.getElementById('idxIn');
  const stamp = document.getElementById('stamp');
  for(const s of SECTIONS){
    const a=document.createElement('a');
    a.href=`#/${s.id}`; a.textContent=s.title; a.dataset.sec=s.id;
    idxIn.appendChild(a);
  }
  try{
    const res = await fetch('data/news.json?v='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    DATA = await res.json();
  }catch(e){
    stamp.textContent = 'DATA UNAVAILABLE';
    document.getElementById('main').innerHTML =
      `<div class="state err">Could not load data/news.json — run the "Update news" workflow in GitHub Actions once, then reload.</div>`;
    return;
  }
  const gen = DATA.generated ? new Date(DATA.generated) : null;
  stamp.textContent = gen
    ? `UPDATED ${fmtDay(gen.toISOString().slice(0,10))} · ${String(gen.getUTCHours()).padStart(2,'0')}${String(gen.getUTCMinutes()).padStart(2,'0')}Z`
    : 'NO DATA YET';
  route();
}

window.addEventListener('hashchange', route);
boot();
</script>
</body>
</html>
