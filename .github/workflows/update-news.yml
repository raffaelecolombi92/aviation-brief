name: Update news

on:
  schedule:
      - cron: "0 */3 * * *"   # every 3 hours (UTC)
  workflow_dispatch:        # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit updated data
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "Daily news update $(date -u +%F)"
          git push
